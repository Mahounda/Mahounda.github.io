<body>

  <!-- HEADER -->
<header class="header">

  <div class="mobile-header">
    <div class="mobile-logo">Menu</div>

    <div class="hamburger-icon" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

    <!-- DESKTOP NAV -->
    <nav class="nav">
    <ul class="nav-menu">
      <li><a href="index.html">Home</a></li>

    <!-- CONTACT SECTION -->
  <section class="contact-section">
    <h1>Curious to explore my journey?</h1>
    <p class="contact-intro">
      I’d love to connect — whether you're exploring collaboration, opportunities, or simply want to say hello.
    </p>

    <form class="contact-form">
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="fname" placeholder="Enter your first name" required />

      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="lname" placeholder="Enter your last name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="yourname@example.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

      <button type="submit" class="btn-primary">Embark</button>
    </form>
  </section>

  <footer class="footer">
  <div class="footer-container">

    <div class="footer-socials">

      <!-- LinkedIn Icon -->

  <!-- MOBILE MENU SCRIPT -->

    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");

    hamburger.addEventListener("click", () => {

    });
