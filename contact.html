<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Mahounda Poinsonnet</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <!-- MOBILE HEADER -->
    <div class="mobile-header">
      <div class="hamburger-icon" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="mobile-logo">Mahounda Poinsonnet</div>
    </div>

    <!-- DESKTOP NAV -->
    <nav class="nav" id="navMenu">
      <ul class="nav-menu">
        <li class="desktop-logo">Mahounda Poinsonnet</li>
        <li><a href="./index.html">About Me</a></li>
        <li><a href="./projects.html">Projects</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>
    </nav>

  </header>

    <!-- CONTACT SECTION -->
  <section class="contact-section">
    <h1>Curious to explore my journey?</h1>
    <p class="contact-intro">
      I’d love to connect — whether you're exploring collaboration, opportunities, or simply want to say hello.
    </p>

    <form class="contact-form">
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="fname" placeholder="Enter your first name" required />

      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="lname" placeholder="Enter your last name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="yourname@example.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

      <button type="submit" class="btn-primary">Embark</button>
    </form>
  </section>

  <!-- FOOTER -->
<footer>
<footer class="footer">
    <div class="footer-content">
        <div class="footer-icons">
            <a href="https://www.linkedin.com" target="_blank">
                <img src="icons/linkedin.svg" alt="LinkedIn" class="footer-icon">
            </a>
            <a href="https://github.com" target="_blank">
                <img src="icons/github.svg" alt="GitHub" class="footer-icon">
            </a>
        </div>

        <p class="footer-name">© 2026 Mahounda Poinsonnet</p>


    <p class="footer-name">Mahounda Poinsonnet – 2026</p>
  </div>
</footer>

  <!-- MOBILE MENU SCRIPT -->
  <script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("navMenu");

    hamburger.addEventListener("click", () => {
      navMenu.classList.toggle("open");
    });
  </script>

</body>
</html>
