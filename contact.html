<body>

  <!-- Header -->

  <div class="container header-inner">

    <!-- Mobile Header -->

      <div class="mobile-logo">MP</div>

      <div class="hamburger-icon" onclick="toggleMenu()">

<!-- Hero -->
<section class="hero">
  <div class="container hero-inner">
    <h1>Contact Me</h1>
    <p class="hero-subtitle">Let’s connect — I’d love to hear from you</p>
  </div>
</section>

<!-- Contact Section -->
<section class="section">
  <div class="container contact-grid">

    <!-- Contact Info -->
    <div class="contact-info card">
      <h2>Get in Touch</h2>
      <p>If you’d like to collaborate, discuss a project, or simply connect, feel free to reach out.</p>

      <div class="contact-details">
        <p><strong>Email:</strong> mahounda@example.com</p>
        <p><strong>Location:</strong> Brisbane, Australia</p>
      </div>

      <div class="contact-socials">
        <a href="https://www.linkedin.com" target="_blank" class="footer-icon">
          <!-- LinkedIn SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24">

        <a href="https://github.com" target="_blank" class="footer-icon">
          <!-- GitHub SVG -->

            <path d="M12 .5C5.73.5.5 5.73.5 12c0 5.1 3.29 9.43 7.86 10.96.58.1.79-.25.79-.56v-2c-3.2.7-3.87-1.37-3.87-1.37-.53-1.33-1.3-1.68-1.3-1.68-1.06-.72.08-.71.08-.71 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.76.41-1.27.75-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.3 1.2-3.11-.12-.3-.52-1.52.11-3.17 0 0 .97-.31 3.18 1.19a11.1 11.1 0 0 1 5.8 0c2.2-1.5 3.17-1.19 3.17-1.19.63 1.65.23 2.87.11 3.17.75.81 1.2 1.85 1.2 3.11 0 4.43-2.69 5.41-5.25 5.69.42.36.8 1.1.8 2.22v3.29c0 .31.21.67.8.56A10.99 10.99 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Contact Form -->
    <form class="contact-form card">
      <h2>Send a Message</h2>

      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your name" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Your email" required>

      <label for="message">Message</label>
      <textarea id="message" rows="5" placeholder="Write your message..." required></textarea>

      <button type="submit" class="btn-primary">Send Message</button>
    </form>

  </div>
</section>

<script>
function toggleBio() {
  const full = document.querySelector('.bio-full');
  const btn = document.querySelector('.btn-toggle');
  full.classList.toggle('hidden');
  btn.textContent = full.classList.contains('hidden') ? 'Read More' : 'Read Less';
}

function toggleMenu() {
  document.querySelector('.nav').classList.toggle('active');
}
</script>
